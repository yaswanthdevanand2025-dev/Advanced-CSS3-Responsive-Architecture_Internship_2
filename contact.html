<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Contact | Yaswanth Devanand Portfolio</title>
  <meta name="description" content="Contact Yaswanth Devanand for web development projects, collaborations, or internship opportunities." />
  <meta name="keywords" content="contact Yaswanth Devanand, web developer contact, portfolio contact form" />
  <meta name="author" content="Yaswanth Devanand" />
  <meta name="robots" content="index, follow" />
  <meta property="og:title" content="Contact | Yaswanth Devanand Portfolio" />
  <meta property="og:description" content="Get in touch with Yaswanth Devanand for web development work and collaboration." />
  <meta property="og:type" content="website" />
  <link rel="canonical" href="https://example.com/contact.html" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=Inter:wght@400;600&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
  <script>
    (function () {
      var saved = localStorage.getItem('theme');
      var prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
      var theme = saved || (prefersDark ? 'dark' : 'light');
      document.documentElement.setAttribute('data-theme', theme);
    })();
  </script>
</head>
<body class="page-shell">
  <a href="#main-content" class="skip-link">Skip to main content</a>
  <header class="site-header">
    <div class="container">
      <div class="header-row">
        <div class="brand">
          <p class="site-title">Yaswanth Devanand</p>
        </div>
      <nav aria-label="Primary navigation">
        <ul class="nav-list">
          <li><a href="index.html">Home</a></li>
          <li><a href="about.html">About</a></li>
          <li><a href="projects.html">Projects</a></li>
          <li><a href="contact.html" aria-current="page">Contact</a></li>
        </ul>
      </nav>
        <button type="button" id="theme-toggle" class="theme-toggle" aria-pressed="false">
        <span class="cursor" aria-hidden="true">$</span>
        <span id="theme-toggle-label">theme --light</span>
      </button>
      </div>
    </div>
  </header>
  <main id="main-content">
    <section aria-labelledby="contact-heading">
      <div class="container">
        <h1 id="contact-heading">Contact Me</h1>
        <p id="contact-description">
          Fill out the form below to send me a message. All fields marked with an asterisk are required.
        </p>
        <form action="#" method="post" aria-labelledby="contact-heading" aria-describedby="contact-description">
          <div class="form-group">
            <label for="name">Full Name <span aria-hidden="true">*</span></label>
            <input
              type="text"
              id="name"
              name="name"
              autocomplete="name"
              required
              aria-required="true"
            />
          </div>
          <div class="form-group">
            <label for="email">Email Address <span aria-hidden="true">*</span></label>
            <input
              type="email"
              id="email"
              name="email"
              autocomplete="email"
              required
              aria-required="true"
            />
          </div>
          <div class="form-group">
            <label for="subject">Subject <span aria-hidden="true">*</span></label>
            <input
              type="text"
              id="subject"
              name="subject"
              required
              aria-required="true"
            />
          </div>
          <div class="form-group">
            <label for="message">Message <span aria-hidden="true">*</span></label>
            <textarea
              id="message"
              name="message"
              rows="6"
              required
              aria-required="true"
            ></textarea>
          </div>
          <button type="submit">Send Message</button>
        </form>
      </div>
    </section>
  </main>
  <footer class="site-footer">
    <div class="container">
      <div class="footer-row">
        <p>&copy; 2026 Yaswanth Devanand. All rights reserved.</p>
      <nav aria-label="Footer navigation">
        <ul class="footer-links">
          <li><a href="index.html">Home</a></li>
          <li><a href="about.html">About</a></li>
          <li><a href="projects.html">Projects</a></li>
        </ul>
      </nav>
      </div>
    </div>
  </footer>
  <script>
    (function () {
      var btn = document.getElementById('theme-toggle');
      var label = document.getElementById('theme-toggle-label');
      function render() {
        var current = document.documentElement.getAttribute('data-theme') || 'light';
        label.textContent = current === 'dark' ? 'theme --dark' : 'theme --light';
        btn.setAttribute('aria-pressed', current === 'dark');
      }
      btn.addEventListener('click', function () {
        var current = document.documentElement.getAttribute('data-theme') || 'light';
        var next = current === 'dark' ? 'light' : 'dark';
        document.documentElement.setAttribute('data-theme', next);
        localStorage.setItem('theme', next);
        render();
      });
      render();
    })();
  </script>
</body>
</html>
